services:
  postgres:
    image: postgres:16-alpine
    container_name: simcard_db
    environment:
      POSTGRES_USER: simcard
      POSTGRES_PASSWORD: SimCard_Prod_2025!
      POSTGRES_DB: simcard_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U simcard']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: simcard_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ghcr.io/focuswilliam/sim-card-shop-backend:production
    container_name: simcard_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://simcard:SimCard_Prod_2025!@postgres:5432/simcard_shop
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: sc-jwt-prod-a7f3b2e1d9c8
      PORT: 3001
      FRONTEND_URL: '*'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    image: ghcr.io/focuswilliam/sim-card-shop-frontend:production
    container_name: simcard_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: simcard_nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
