name: CI/CD Pipeline

# ============================================================
# Git Branching Strategy:
#
#   feature/xxx  →  PR →  dev  →  PR →  main (production)
#
#   - feature/*    : daily development, push freely
#   - dev          : integration branch, auto-deploys to staging
#   - main         : production, only merged via PR from dev
#
# Workflow:
#   1. Create feature branch:  git checkout -b feature/add-payment
#   2. Develop & push:         git push origin feature/add-payment
#   3. Open PR → dev:          triggers lint & test
#   4. Merge to dev:           triggers build + deploy to staging
#   5. Open PR → main:         triggers lint & test again
#   6. Merge to main:          triggers build + deploy to production
# ============================================================

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ==================== Lint & Test (runs on everything) ====================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Run backend tests
        working-directory: ./backend
        run: npm test --if-present

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # ==================== Build Docker Images ====================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    # Only build on push to dev or main (not on PRs or feature branches)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_tag=production" >> $GITHUB_OUTPUT
          else
            echo "env_tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          target: production
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.tag.outputs.env_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # ==================== Deploy to Production (main only) ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/sim-card-shop
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose -f docker-compose.cloud.yml up -d --build --remove-orphans
            docker image prune -f
            echo "✅ Production deployed at $(date)"

  # ==================== Deploy to Staging (dev only) ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/sim-card-shop
            git fetch origin dev
            git checkout dev
            git pull origin dev
            docker compose -f docker-compose.cloud.yml up -d --build --remove-orphans
            docker image prune -f
            echo "✅ Staging deployed at $(date)"
